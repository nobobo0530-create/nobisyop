<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SalesLog">
  <meta name="theme-color" content="#0a0a0a">
  <title>SalesLog</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="shortcut icon" href="/favicon.ico">

  <!-- QRコード -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin></script>
  <!-- React 本番ビルド（開発版の約8倍高速・小さい） -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google OAuth 設定（Client IDをここで一元管理） -->
  <script src="/js/google-config.js?v=20260413d"></script>
  <!-- Google OAuth（非同期） -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <style>
    :root {
      --color-primary: #E84040;
      --color-primary-dark: #c73333;
      --color-primary-light: #ff6b6b;
      --bg: #f0f2f5;
      --card-radius: 18px;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-size: 16px !important; }

    .slide-up { animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp {
      from { transform: translateY(28px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* iOS タップ遅延・タッチフリーズ対策 */
    button, a, [role="button"], input[type="button"], input[type="submit"] {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ボタン */
    .btn-primary {
      background: var(--color-primary); color: white; border: none;
      border-radius: 14px; padding: 15px 24px; font-size: 16px; font-weight: 700;
      cursor: pointer; min-height: 50px;
      transition: transform 0.12s, background 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(232,64,64,0.28);
      letter-spacing: 0.01em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { transform: scale(0.96); background: var(--color-primary-dark); box-shadow: none; }
    .btn-secondary {
      background: white; color: var(--color-primary);
      border: 2px solid var(--color-primary); border-radius: 14px;
      padding: 13px 20px; font-size: 15px; font-weight: 700;
      cursor: pointer; min-height: 50px; transition: all 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:active { background: #fff0f0; transform: scale(0.97); }

    /* カード */
    .card {
      background: white; border-radius: var(--card-radius);
      box-shadow: var(--card-shadow); overflow: hidden;
    }

    /* 入力 */
    .input-field {
      width: 100%; border: 1.5px solid #e8e8e8; border-radius: 12px;
      padding: 13px 14px; font-size: 16px; transition: all 0.15s;
      background: #fafafa; outline: none; color: #1a1a1a;
    }
    .input-field:focus {
      border-color: var(--color-primary); background: white;
      box-shadow: 0 0 0 3px rgba(232,64,64,0.1);
    }
    .input-field.highlight { border-color: #f59e0b; background: #fffbeb; }
    label.field-label {
      font-size: 11px; font-weight: 700; color: #aaa;
      margin-bottom: 6px; display: block;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ボトムナビ */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 -1px 0 rgba(0,0,0,0.06), 0 -8px 24px rgba(0,0,0,0.05);
      display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 4px 6px; cursor: pointer; min-height: 56px;
      transition: color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent; position: relative;
    }
    .bottom-nav-item:active { transform: scale(0.9); }
    .bottom-nav-item .nav-icon { width: 24px; height: 24px; margin-bottom: 3px; }
    .bottom-nav-item .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.02em; }
    .bottom-nav-item.active { color: var(--color-primary); }
    .bottom-nav-item:not(.active) { color: #c0c0c0; }
    .bottom-nav-item.active .nav-icon-bg {
      position: absolute; top: 4px;
      width: 40px; height: 32px;
      background: rgba(232,64,64,0.1); border-radius: 10px;
    }

    /* ヘッダー */
    .main-content {
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
    }
    .header {
      background: var(--color-primary); color: white;
      padding: 14px 16px 12px;
      padding-top: calc(14px + env(safe-area-inset-top));
    }
    .header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }

    /* モーダル */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; display: flex; align-items: flex-end;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .modal-content {
      background: white; border-radius: 24px 24px 0 0;
      width: 100%; max-height: 92vh; overflow-y: auto;
      padding: 8px 20px 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .modal-handle {
      width: 40px; height: 4px; background: #e0e0e0;
      border-radius: 2px; margin: 0 auto 16px;
    }

    /* タグ */
    .tag { display: inline-block; padding: 3px 9px; border-radius: 7px; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }
    .tag-s { background: #dcfce7; color: #166534; }
    .tag-a { background: #dbeafe; color: #1e40af; }
    .tag-b { background: #fef9c3; color: #854d0e; }
    .tag-c { background: #fee2e2; color: #991b1b; }
    .tag-active { background: #dbeafe; color: #1e40af; }
    .tag-sold { background: #ede9fe; color: #5b21b6; }
    .tag-unlisted { background: #f3f4f6; color: #6b7280; }

    /* スピナー */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 写真グリッド */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photo-item {
      aspect-ratio: 1; border-radius: 12px; overflow: hidden;
      position: relative; background: #f0f0f0; cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-add {
      border: 2px dashed #ddd; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px; color: #bbb;
    }

    /* KPIカード */
    .kpi-card {
      background: white; border-radius: 16px; padding: 16px;
      box-shadow: var(--card-shadow);
    }
    .kpi-label { font-size: 11px; color: #aaa; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-value { font-size: 26px; font-weight: 800; color: #111; letter-spacing: -0.03em; }
    .kpi-unit { font-size: 14px; color: #888; font-weight: 500; }

    textarea.input-field { resize: vertical; min-height: 120px; }

    /* ステップインジケーター */
    .step-indicator { display: flex; gap: 6px; padding: 0 16px 12px; }
    .step { flex: 1; height: 3px; border-radius: 2px; background: #eee; transition: background 0.3s; }
    .step.active { background: var(--color-primary); }
    .step.done { background: #f9a0a0; }

    /* トースト */
    .toast {
      position: fixed; bottom: calc(76px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      background: #111; color: white;
      padding: 11px 22px; border-radius: 99px;
      font-size: 14px; font-weight: 600; z-index: 9999;
      animation: toastIn 0.25s cubic-bezier(0.16,1,0.3,1), toastOut 0.2s ease-in 2.3s forwards;
      white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(14px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* セクションタイトル */
    .section-title {
      font-size: 13px; font-weight: 700; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 16px 16px 8px;
    }

    /* ── ローディング画面 ── */
    #app-loading {
      position: fixed; inset: 0;
      background: #0f172a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.35s ease;
      padding-top: env(safe-area-inset-top);
    }
    #app-loading.hide { opacity: 0; pointer-events: none; }
    #app-loading .logo {
      font-size: 30px; font-weight: 900; color: white;
      letter-spacing: -1.5px; margin-bottom: 6px;
    }
    #app-loading .sub {
      font-size: 11px; color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em; font-weight: 600; text-transform: uppercase;
      margin-bottom: 40px;
    }
    #app-loading .bar-wrap {
      width: 120px; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
    }
    #app-loading .bar {
      height: 100%; background: #E84040; border-radius: 2px;
      animation: barPulse 1.4s ease-in-out infinite;
      transform-origin: left;
    }
    @keyframes barPulse {
      0%   { transform: scaleX(0.1) translateX(0); }
      50%  { transform: scaleX(1)   translateX(0); }
      100% { transform: scaleX(0.1) translateX(1000%); }
    }
    #app-loading .status {
      margin-top: 16px; font-size: 11px;
      color: rgba(255,255,255,0.25); font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- ローディング画面（アプリ起動まで表示） -->
  <div id="app-loading">
    <div class="logo">SalesLog</div>
    <div class="sub">Sales Management</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div class="status" id="load-status">読み込み中...</div>
  </div>

  <div id="root"></div>

  <script>
  // ── iOS Safari: キーボード起因のタッチ座標ズレ根本修正 ──
  // 症状: キーボード開閉後、見た目上正しい位置にボタンがあるのに押せなくなる
  // 原因: iOSのスクロール座標追跡がズレたまま→タッチが別の場所に飛ぶ
  // 修正: キーボードが「完全に閉じた後」に1px強制スクロール→元に戻すことでiOS座標を強制リセット
  (function() {
    var fixTimer = null;

    function fixIOSTouchTargets() {
      // 重要: scrollTo(same, same) はiOSがスキップするため、1px動かして元に戻す
      var sx = window.scrollX || 0;
      var sy = window.scrollY || 0;
      // 強制的に1pxスクロール変化を起こしてiOSの座標追跡をリセット
      window.scrollTo(sx, sy + 1);
      requestAnimationFrame(function() {
        window.scrollTo(sx, sy);
      });
    }

    // visualViewportのリサイズが安定してから実行（キーボードアニメーション完了待ち）
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        // デバウンス: リサイズイベントが連続する間は待機し、止まったら実行
        if (fixTimer) clearTimeout(fixTimer);
        fixTimer = setTimeout(function() {
          fixTimer = null;
          fixIOSTouchTargets();
        }, 200); // キーボードアニメーション完了を待つ
      });
    }

    // focusout時（input/textarea/selectからフォーカスが外れた = キーボードが閉じ始める）
    document.addEventListener('focusout', function(e) {
      if (!e.target) return;
      var tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
        // キーボードが完全に閉じ終わるまで待ってから修正
        // iOS キーボードアニメーション: 約300-400ms
        if (fixTimer) clearTimeout(fixTimer);
        fixTimer = setTimeout(function() {
          fixTimer = null;
          fixIOSTouchTargets();
        }, 450);
      }
    });
  })();
  </script>

  <script>
  // ── Babel コンパイルキャッシュ + 高速起動ローダー ──
  // 仕組み: 初回のみBabelでコンパイル → localStorage にキャッシュ
  //         2回目以降はキャッシュからそのまま実行 → 起動 < 1秒
  (function() {
    var VERSION = '20260413o';
    var COMPILE_KEY = 'nobushop_compiled_' + VERSION;

    var loadingEl = document.getElementById('app-loading');
    var statusEl  = document.getElementById('load-status');

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
    }

    function hideLoading() {
      if (!loadingEl) return;
      loadingEl.classList.add('hide');
      setTimeout(function() {
        if (loadingEl && loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
      }, 400);
    }

    function execCode(code) {
      var s = document.createElement('script');
      s.textContent = code;
      document.head.appendChild(s);
      // React が同期レンダリングする少し後にローディングを消す
      requestAnimationFrame(function() {
        requestAnimationFrame(hideLoading);
      });
    }

    // 古バージョンのキャッシュを削除
    try {
      var allKeys = Object.keys(localStorage);
      for (var i = 0; i < allKeys.length; i++) {
        var k = allKeys[i];
        if (k.indexOf('nobushop_compiled_') === 0 && k !== COMPILE_KEY) {
          localStorage.removeItem(k);
        }
      }
    } catch(e) {}

    // ── 高速パス: キャッシュ済みコンパイル結果を直接実行 ──
    try {
      var cached = localStorage.getItem(COMPILE_KEY);
      if (cached) {
        setStatus('');
        execCode(cached);
        return; // Babel不要 → ここで完了（起動 < 500ms）
      }
    } catch(e) {}

    // ── 低速パス（初回のみ）: Babel を動的ロード → コンパイル → キャッシュ ──
    setStatus('初回セットアップ中...');

    function loadScript(src, onLoad, onError) {
      var s = document.createElement('script');
      s.src = src;
      s.crossOrigin = 'anonymous';
      s.onload  = onLoad;
      s.onerror = onError || function() { setStatus('スクリプト読込エラー'); };
      document.head.appendChild(s);
    }

    function compileAndRun(src) {
      setStatus('コンパイル中...');
      var compiled;
      try {
        compiled = Babel.transform(src, {
          // runtime:'classic' で React.createElement() を使う（automatic はブラウザでrequire未定義エラー）
          presets: [['react', { runtime: 'classic' }]],
          sourceType: 'script',
        }).code;
      } catch(err) {
        console.error('[SalesLog] コンパイルエラー:', err);
        setStatus('コンパイルエラー。再読込してください。');
        return;
      }

      // キャッシュ保存（失敗しても動作継続）
      try {
        localStorage.setItem(COMPILE_KEY, compiled);
      } catch(e) {
        console.warn('[SalesLog] キャッシュ保存失敗（容量不足の可能性）:', e.message);
      }

      setStatus('');
      execCode(compiled);
    }

    // Babel standalone を動的ロード（初回のみ必要）
    loadScript(
      'https://unpkg.com/@babel/standalone/babel.min.js',
      function() {
        // Babel ロード完了 → ソースを fetch
        setStatus('ソース取得中...');
        fetch('/js/app.js?v=' + VERSION)
          .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          })
          .then(compileAndRun)
          .catch(function(err) {
            console.error('[SalesLog] fetch エラー:', err);
            setStatus('読込エラー。再読込してください。');
          });
      },
      function() {
        setStatus('Babel読込失敗。再読込してください。');
      }
    );

    // ── Service Worker 登録 ──
    if ('serviceWorker' in navigator) {
      // ★ 新しいSWが制御を取得したら自動リロード（ユーザーが常に最新版を受け取るための必須処理）
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        console.log('[SW] controller changed → reloading for latest version');
        window.location.reload();
      });
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/', updateViaCache: 'none' })
          .then(function(reg) {
            console.log('[SW] 登録成功:', reg.scope);
          })
          .catch(function(e) {
            console.warn('[SW] 登録失敗:', e.message);
          });
      });
    }
  })();
  </script>

</body>
</html>
