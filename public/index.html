<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="のびSHOP">
  <meta name="theme-color" content="#E84040">
  <title>のびSHOP 管理アプリ</title>
  <link rel="manifest" href="/manifest.json">
  <!-- Apple Touch Icon（iPhone ホーム画面） -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <!-- Supabase SDK不要（raw fetch直接実装に切り替え済み） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-primary: #E84040;
      --color-primary-dark: #c73333;
      --color-primary-light: #ff6b6b;
      --safe-area-inset-top: env(safe-area-inset-top);
      --safe-area-inset-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
    input, textarea, select {
      font-size: 16px !important; /* prevent zoom on iOS */
    }
    .slide-up {
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .fade-in {
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:active { transform: scale(0.97); background: var(--color-primary-dark); }
    .btn-secondary {
      background: white;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: all 0.15s;
    }
    .btn-secondary:active { background: #fff0f0; }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .input-field {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      transition: border-color 0.15s;
      background: white;
      outline: none;
    }
    .input-field:focus { border-color: var(--color-primary); }
    .input-field.highlight { border-color: #f59e0b; background: #fffbeb; }
    label.field-label {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin-bottom: 5px;
      display: block;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e5e5e5;
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px;
      cursor: pointer;
      min-height: 56px;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item .nav-icon { font-size: 22px; margin-bottom: 2px; }
    .bottom-nav-item .nav-label { font-size: 10px; font-weight: 600; }
    .bottom-nav-item.active { color: var(--color-primary); }
    .bottom-nav-item:not(.active) { color: #999; }
    .main-content {
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
    }
    .header {
      background: var(--color-primary);
      color: white;
      padding: 16px 16px 12px;
      padding-top: calc(16px + env(safe-area-inset-top));
    }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
    }
    .modal-content {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .tag-s { background: #d1fae5; color: #065f46; }
    .tag-a { background: #dbeafe; color: #1e3a5f; }
    .tag-b { background: #fef3c7; color: #92400e; }
    .tag-c { background: #fee2e2; color: #991b1b; }
    .tag-active { background: #d1fae5; color: #065f46; }
    .tag-sold { background: #e0e7ff; color: #3730a3; }
    .tag-unlisted { background: #f3f4f6; color: #6b7280; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .photo-item {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #f0f0f0;
      cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-add {
      border: 2px dashed #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #999;
    }
    .kpi-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .kpi-label { font-size: 12px; color: #999; font-weight: 500; margin-bottom: 6px; }
    .kpi-value { font-size: 24px; font-weight: 700; color: #1a1a1a; }
    .kpi-unit { font-size: 14px; color: #666; }
    textarea.input-field { resize: vertical; min-height: 120px; }
    .step-indicator {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .step {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e0e0e0;
      transition: background 0.3s;
    }
    .step.active { background: var(--color-primary); }
    .step.done { background: var(--color-primary-dark); }
    .toast {
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      animation: toastIn 0.2s ease-out, toastOut 0.2s ease-in 2s forwards;
      white-space: nowrap;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/js/app.js?v=20260331c" type="text/babel"></script>
</body>
</html>
