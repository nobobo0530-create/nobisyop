<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SalesLog">
  <meta name="theme-color" content="#0a0a0a">

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- React 本番ビルド（開発版の約8倍高速・小さい） -->

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    :root {
      --color-primary: #E84040;
      --color-primary-dark: #c73333;
      --color-primary-light: #ff6060;
      /* iOS System Colors */
      --bg: #f2f2f7;
      --bg-secondary: #ffffff;
      --bg-tertiary: rgba(118,118,128,0.12);
      --label: #000000;
      --label-secondary: rgba(60,60,67,0.6);
      --label-tertiary: rgba(60,60,67,0.3);
      --separator: rgba(60,60,67,0.18);
      --separator-opaque: #c6c6c8;
      --fill: rgba(120,120,128,0.2);
      --card-radius: 16px;
      --card-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.04), 0 8px 28px rgba(0,0,0,0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "tnum";
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-size: 16px !important; font-family: inherit; }

    .slide-up { animation: slideUp 0.38s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.22s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* iOS タップ遅延・タッチフリーズ対策 */
    button, a, [role="button"], input[type="button"], input[type="submit"] {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── ボタン ── */
    .btn-primary {
      background: var(--color-primary); color: white; border: none;
      border-radius: 14px; padding: 16px 24px; font-size: 17px; font-weight: 600;
      cursor: pointer; min-height: 52px;
      transition: opacity 0.12s, transform 0.12s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: -0.01em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-primary:active { opacity: 0.75; transform: scale(0.97); }
    .btn-secondary {
      background: var(--bg-tertiary); color: var(--color-primary);
      border: none; border-radius: 14px;
      padding: 14px 20px; font-size: 15px; font-weight: 600;
      cursor: pointer; min-height: 50px; transition: opacity 0.12s, transform 0.12s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn-secondary:active { opacity: 0.7; transform: scale(0.97); }

    /* ── カード ── */
    .card {
      background: var(--bg-secondary); border-radius: var(--card-radius);
      box-shadow: var(--card-shadow); overflow: hidden;
    }

    /* ── 入力 ── */
    .input-field {
      width: 100%; border: none; border-radius: 12px;
      padding: 13px 14px; font-size: 16px; transition: all 0.18s;
      background: var(--bg-tertiary); outline: none;
      color: var(--label); font-family: inherit;
      -webkit-appearance: none;
    }
    .input-field:focus {
      background: white;
      box-shadow: 0 0 0 3.5px rgba(232,64,64,0.18), 0 1px 4px rgba(0,0,0,0.06);
    }
    .input-field.highlight { box-shadow: 0 0 0 3px rgba(245,158,11,0.25); background: #fffbeb; }
    label.field-label {
      font-size: 11px; font-weight: 600; color: var(--label-secondary);
      margin-bottom: 7px; display: block;
      text-transform: uppercase; letter-spacing: 0.07em;
    }

    /* ── ボトムナビ ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(249,249,249,0.94);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--separator-opaque);
      display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 4px 5px; cursor: pointer; min-height: 56px;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent; position: relative;
    }
    .bottom-nav-item:active { opacity: 0.5; }
    .bottom-nav-item .nav-icon { width: 25px; height: 25px; margin-bottom: 3px; }
    .bottom-nav-item .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }
    .bottom-nav-item.active { color: var(--color-primary); }
    .bottom-nav-item:not(.active) { color: #8e8e93; }
    .bottom-nav-item.active .nav-icon-bg {
      position: absolute; top: 5px;
      width: 44px; height: 30px;
      background: rgba(232,64,64,0.08); border-radius: 12px;
    }

    /* ── ヘッダー ── */
    .main-content {
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
    }
    .header {
      background: linear-gradient(160deg, #f03a3a 0%, #d63030 100%);
      color: white;
      padding: 13px 16px 12px;
      padding-top: calc(13px + env(safe-area-inset-top));
    }
    .header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.03em; }

    /* ── モーダル ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; display: flex; align-items: flex-end;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .modal-content {
      background: var(--bg-secondary); border-radius: 20px 20px 0 0;
      width: 100%; max-height: 92vh; overflow-y: auto;
      padding: 6px 20px 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .modal-handle {
      width: 36px; height: 5px; background: var(--separator-opaque);
      border-radius: 3px; margin: 8px auto 14px;
    }

    /* ── タグ ── */
    .tag {
      display: inline-block; padding: 3px 10px;
      border-radius: 99px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.01em;
    }
    .tag-s { background: rgba(52,199,89,0.15); color: #248a3d; }
    .tag-a { background: rgba(0,122,255,0.13); color: #0055cc; }
    .tag-b { background: rgba(255,159,10,0.15); color: #b25000; }
    .tag-c { background: rgba(255,59,48,0.13); color: #c0392b; }
    .tag-active { background: rgba(0,122,255,0.13); color: #0055cc; }
    .tag-sold { background: rgba(175,82,222,0.13); color: #7c3ab3; }
    .tag-unlisted { background: rgba(142,142,147,0.15); color: #636366; }

    /* ── スピナー ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.65s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 写真グリッド ── */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .photo-item {
      aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      position: relative; background: var(--bg-tertiary); cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-add {
      border: 1.5px dashed rgba(0,0,0,0.15); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px; color: #aeaeb2;
    }

    /* ── KPIカード ── */
    .kpi-card {
      background: var(--bg-secondary); border-radius: 16px; padding: 16px;
      box-shadow: var(--card-shadow);
    }
    .kpi-label {
      font-size: 11px; color: var(--label-secondary); font-weight: 600;
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .kpi-value {
      font-size: 28px; font-weight: 700; color: var(--label);
      letter-spacing: -0.04em; font-feature-settings: "tnum";
    }
    .kpi-unit { font-size: 15px; color: var(--label-secondary); font-weight: 500; }

    textarea.input-field { resize: vertical; min-height: 120px; line-height: 1.5; }

    /* ── ステップインジケーター ── */
    .step-indicator { display: flex; gap: 5px; padding: 0 16px 14px; }
    .step { flex: 1; height: 3px; border-radius: 99px; background: var(--separator); transition: background 0.3s; }
    .step.active { background: var(--color-primary); }
    .step.done { background: rgba(232,64,64,0.4); }

    /* ── トースト ── */
    .toast {
      position: fixed; bottom: calc(78px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      background: rgba(30,30,30,0.92); color: white;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 11px 20px; border-radius: 99px;
      font-size: 14px; font-weight: 500; z-index: 9999;
      animation: toastIn 0.3s cubic-bezier(0.16,1,0.3,1), toastOut 0.2s ease-in 2.3s forwards;
      white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      letter-spacing: -0.01em;
    }
    @keyframes toastIn {
      from { opacity:0; transform:translateX(-50%) translateY(12px) scale(0.96); }
      to   { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
    }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* ── セクションタイトル ── */
    .section-title {
      font-size: 13px; font-weight: 600; color: var(--label-secondary);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 20px 16px 8px;
    }

    /* ── ローディング画面 ── */
    #app-loading {
      position: fixed; inset: 0;
      background: #111111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1);
      padding-top: env(safe-area-inset-top);
    }
    #app-loading.hide { opacity: 0; pointer-events: none; }
    #app-loading .logo {
      font-size: 32px; font-weight: 800; color: white;
      letter-spacing: -1.5px; margin-bottom: 4px;
    }
    #app-loading .sub {
      font-size: 10px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.16em; font-weight: 600; text-transform: uppercase;
      margin-bottom: 44px;
    }
    #app-loading .bar-wrap {
      width: 100px; height: 2px;
      background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
    }
    #app-loading .bar {
      height: 100%; background: #E84040; border-radius: 99px;
      animation: barPulse 1.4s ease-in-out infinite;
      transform-origin: left;
    }
    @keyframes barPulse {
      0%   { transform: scaleX(0.1) translateX(0); }
      50%  { transform: scaleX(1)   translateX(0); }
      100% { transform: scaleX(0.1) translateX(1000%); }
    }
    #app-loading .status {
      margin-top: 18px; font-size: 11px;
      color: rgba(255,255,255,0.2); font-weight: 500; letter-spacing: 0.02em;
    }
  </style>

<body>

  <!-- ローディング画面（アプリ起動まで表示） -->
  <div id="app-loading">
    <div class="logo">SalesLog</div>
    <div class="sub">Sales Management</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div class="status" id="load-status">読み込み中...</div>
  </div>

  <div id="root"></div>

  <script>
  // ── iOS Safari: キーボード起因のタッチ座標ズレ根本修正 ──
  // 症状: キーボード開閉後、見た目上正しい位置にボタンがあるのに押せなくなる
  // 原因: iOSのスクロール座標追跡がズレたまま→タッチが別の場所に飛ぶ
  // 修正: キーボードが「完全に閉じた後」に1px強制スクロール→元に戻すことでiOS座標を強制リセット
  (function() {
    var fixTimer = null;

    function fixIOSTouchTargets() {
      // 重要: scrollTo(same, same) はiOSがスキップするため、1px動かして元に戻す
      var sx = window.scrollX || 0;
      var sy = window.scrollY || 0;
      // 強制的に1pxスクロール変化を起こしてiOSの座標追跡をリセット
      window.scrollTo(sx, sy + 1);
      requestAnimationFrame(function() {
        window.scrollTo(sx, sy);
      });
    }

    // visualViewportのリサイズが安定してから実行（キーボードアニメーション完了待ち）
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        // デバウンス: リサイズイベントが連続する間は待機し、止まったら実行
        if (fixTimer) clearTimeout(fixTimer);
        fixTimer = setTimeout(function() {
          fixTimer = null;
          fixIOSTouchTargets();
        }, 200); // キーボードアニメーション完了を待つ
      });
    }

    // focusout時（input/textarea/selectからフォーカスが外れた = キーボードが閉じ始める）
    document.addEventListener('focusout', function(e) {
      if (!e.target) return;
      var tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
        // キーボードが完全に閉じ終わるまで待ってから修正
        // iOS キーボードアニメーション: 約300-400ms
        if (fixTimer) clearTimeout(fixTimer);
        fixTimer = setTimeout(function() {
          fixTimer = null;
          fixIOSTouchTargets();
        }, 450);
      }
    });
  })();
  </script>

  <script>
  // ★ 強制更新後のキャッシュバスターURLパラメータをクリーンアップ
  (function() {
    if (window.location.search.includes('_t=') || window.location.search.includes('init=')) {
      window.history.replaceState({}, '', '/');
    }
  })();
  </script>
  <script>
  // ★ アプリバージョンをグローバルに公開（app.jsのヘッダー表示で参照）
  window._APP_VERSION = 'v20260418m';
  </script>

  <script>
  // ── Babel コンパイルキャッシュ + 自動更新ローダー ──
  // 仕組み: 起動時にサーバー側 app.js のバージョン (Last-Modified/ETag) を毎回確認
  //   → 同一なら localStorage キャッシュから即実行（起動 < 1秒）
  //   → 異なれば自動でフェッチ・再コンパイル → 常に最新版で起動（ノータッチ更新）
  //   → オフラインなら最後にキャッシュした版で起動（オフライン対応）
  (function() {
    var FALLBACK_VERSION = '20260418m';

    var loadingEl = document.getElementById('app-loading');
    var statusEl  = document.getElementById('load-status');

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
    }

    function hideLoading() {
      if (!loadingEl) return;
      loadingEl.classList.add('hide');
      setTimeout(function() {
        if (loadingEl && loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
      }, 400);
    }

    function execCode(code) {
      var s = document.createElement('script');
      s.textContent = code;
      document.head.appendChild(s);
      // React が同期レンダリングする少し後にローディングを消す
      requestAnimationFrame(function() {
        requestAnimationFrame(hideLoading);
      });
    }

    // サーバーレスポンスヘッダから安定した「バージョン文字列」を作る
    function deriveVersionTag(headers) {
      var etag = headers.get && headers.get('ETag');
      var lm   = headers.get && headers.get('Last-Modified');
      var len  = headers.get && headers.get('Content-Length');
      var raw  = etag || lm || len || FALLBACK_VERSION;
      // localStorage キーに使うので英数字のみに正規化
      return String(raw).replace(/[^a-zA-Z0-9]/g, '_').slice(0, 60) || FALLBACK_VERSION;
    }

    function makeCacheKey(versionTag) {
      return 'nobushop_compiled_' + versionTag;
    }

    // 古いバージョンのキャッシュを削除
    function purgeOldCaches(currentKey) {
      try {
        Object.keys(localStorage).forEach(function(k) {
          if (k.indexOf('nobushop_compiled_') === 0 && k !== currentKey) {
            localStorage.removeItem(k);
          }
        });
      } catch(e) {}
    }

    function loadScript(src, onLoad, onError) {
      var s = document.createElement('script');
      s.src = src;
      s.crossOrigin = 'anonymous';
      s.onload  = onLoad;
      s.onerror = onError || function() { setStatus('スクリプト読込エラー'); };
      document.head.appendChild(s);
    }

    function compileAndRun(src, cacheKey) {
      setStatus('新しいバージョンを準備中...');
      var compiled;
      try {
        compiled = Babel.transform(src, {
          // runtime:'classic' で React.createElement() を使う（automatic はブラウザでrequire未定義エラー）
          presets: [['react', { runtime: 'classic' }]],
          sourceType: 'script',
        }).code;
      } catch(err) {
        console.error('[SalesLog] コンパイルエラー:', err);
        setStatus('コンパイルエラー。再読込してください。');
        return;
      }
      try { localStorage.setItem(cacheKey, compiled); }
      catch(e) { console.warn('[SalesLog] キャッシュ保存失敗:', e.message); }
      setStatus('');
      execCode(compiled);
    }

    function fetchAndCompile(cacheKey) {
      // Babel が未ロードならロード → fetch → コンパイル
      var doFetch = function() {
        setStatus('最新版を取得中...');
        fetch('/js/app.js?v=' + cacheKey, { cache: 'no-store' })
          .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          })
          .then(function(src) { compileAndRun(src, cacheKey); })
          .catch(function(err) {
            console.error('[SalesLog] fetch エラー:', err);
            // フェッチ失敗 → 何かキャッシュがあれば最後の手段として使う
            try {
              var anyKey = Object.keys(localStorage).filter(function(k) { return k.indexOf('nobushop_compiled_') === 0; })[0];
              if (anyKey) {
                console.warn('[SalesLog] フォールバック: 既存キャッシュを使用');
                execCode(localStorage.getItem(anyKey));
                return;
              }
            } catch(e) {}
            setStatus('読込エラー。ネット接続を確認して再読込してください。');
          });
      };
      if (typeof Babel !== 'undefined') doFetch();
      else loadScript('https://unpkg.com/@babel/standalone/babel.min.js', doFetch,
        function() { setStatus('Babel読込失敗。再読込してください。'); });
    }

    // ── 起動メインフロー: サーバーに更新があるか必ず確認 ──
    function startup() {
      // HEAD リクエストでサーバーの app.js バージョンを取得
      // SW が network-first なので、これで最新の Last-Modified/ETag が取れる
      fetch('/js/app.js?_check=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (!r.ok) throw new Error('HEAD ' + r.status);
          var versionTag = deriveVersionTag(r.headers);
          var cacheKey   = makeCacheKey(versionTag);
          purgeOldCaches(cacheKey);

          // このバージョンのコンパイル済みキャッシュがあるか
          var cached = null;
          try { cached = localStorage.getItem(cacheKey); } catch(e) {}

          if (cached) {
            // 同一バージョン → 高速パス（即実行）
            setStatus('');
            execCode(cached);
          } else {
            // 新バージョンまたは初回 → フェッチ・コンパイル
            console.log('[SalesLog] 新バージョン検出 → 自動更新します:', versionTag);
            fetchAndCompile(cacheKey);
          }
        })
        .catch(function(err) {
          // オフライン or HEAD失敗 → 既存キャッシュを使ってオフライン起動
          console.warn('[SalesLog] 更新チェック失敗 (オフライン?):', err.message);
          try {
            var anyKey = Object.keys(localStorage).filter(function(k) { return k.indexOf('nobushop_compiled_') === 0; })[0];
            if (anyKey) {
              setStatus('');
              execCode(localStorage.getItem(anyKey));
              return;
            }
          } catch(e) {}
          // キャッシュもなければ初回起動を試みる（オンラインに戻ったとき）
          setStatus('初回セットアップ中...');
          fetchAndCompile(makeCacheKey(FALLBACK_VERSION));
        });
    }
    startup();

    // ── Service Worker 登録 ──
    if ('serviceWorker' in navigator) {
      // ★ 新しいSWが制御を取得したら自動リロード（ユーザーが常に最新版を受け取るための必須処理）
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        console.log('[SW] controller changed → reloading for latest version');
        window.location.reload();
      });
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/', updateViaCache: 'none' })
          .then(function(reg) {
            console.log('[SW] 登録成功:', reg.scope);
            // ★ 起動時に毎回SW更新チェックを強制実行（24時間制限バイパス）
            reg.update().catch(function(){});
            // ★ 3秒後にも再チェック（WiFi接続が遅い場合の対策）
            setTimeout(function() { reg.update().catch(function(){}); }, 3000);
          })
          .catch(function(e) {
            console.warn('[SW] 登録失敗:', e.message);
          });
      });
      // ★ 強制更新関数をグローバルに公開（アプリ内の「更新」ボタンから呼び出せる）
      // ★★ 全3層のキャッシュを完全削除して新版を確実に取得：
      //    1. localStorage（Babelコンパイル済みJS）
      //    2. caches API（Service Workerが保持する app.js / index.html / 画像 等）
      //    3. SW自体を unregister して完全リセット → 次回登録で最新版になる
      window._forceSwUpdate = function() {
        // 1. Babelコンパイルキャッシュを削除
        try {
          Object.keys(localStorage).filter(function(k){ return k.startsWith('nobushop_compiled'); })
            .forEach(function(k){ localStorage.removeItem(k); });
        } catch(e) {}

        var afterClear = function() {
          // 4. キャッシュバスターURLでナビゲート（HTTPキャッシュを完全バイパス）
          //    location.reload(true) はiOS Safariで無視されるためURLを変える方式を使用
          window.location.replace(window.location.origin + '/?_t=' + Date.now());
        };

        // 2 & 3 を並行実行 → 両方完了したらリロード
        var pending = 2;
        var done = function() { if (--pending <= 0) afterClear(); };

        // 2. caches API のすべてのキャッシュを削除（SW が持ってる app.js キャッシュも消える）
        try {
          if (typeof caches !== 'undefined' && caches.keys) {
            caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            }).then(done).catch(done);
          } else { done(); }
        } catch(e) { done(); }

        // 3. Service Worker を unregister（次の起動で最新版が登録される）
        try {
          if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).then(done).catch(done);
          } else { done(); }
        } catch(e) { done(); }

        // セーフティネット: 5秒経っても両方の Promise が返らなかった場合は強制リロード
        setTimeout(afterClear, 5000);
      };
    }
  })();
  </script>
