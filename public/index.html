<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SalesLog">
  <meta name="theme-color" content="#0a0a0a">
  <title>SalesLog</title>
  <link rel="manifest" href="/manifest.json">
  <!-- Apple Touch Icon（iPhone ホーム画面） -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-primary: #6366f1;
      --color-primary-dark: #4f46e5;
      --color-primary-light: #818cf8;
      --bg-base: #0a0a0a;
      --bg-card: #141414;
      --bg-card2: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --safe-area-inset-top: env(safe-area-inset-top);
      --safe-area-inset-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-size: 16px !important; }
    .slide-up { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── ボタン ── */
    .btn-primary {
      background: var(--color-primary);
      color: white; border: none; border-radius: 12px;
      padding: 14px 24px; font-size: 16px; font-weight: 600;
      cursor: pointer; min-height: 44px;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:active { transform: scale(0.97); background: var(--color-primary-dark); }
    .btn-secondary {
      background: rgba(99,102,241,0.12);
      color: var(--color-primary-light);
      border: 1.5px solid rgba(99,102,241,0.35);
      border-radius: 12px; padding: 12px 20px;
      font-size: 15px; font-weight: 600; cursor: pointer; min-height: 44px;
      transition: all 0.15s;
    }
    .btn-secondary:active { background: rgba(99,102,241,0.2); }

    /* ── カード ── */
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── フォーム ── */
    .input-field {
      width: 100%; border: 1.5px solid #2a2a2a; border-radius: 10px;
      padding: 12px 14px; font-size: 16px; transition: border-color 0.15s;
      background: #1e1e1e; color: #f0f0f0; outline: none;
    }
    .input-field:focus { border-color: var(--color-primary); }
    .input-field.highlight { border-color: #f59e0b; background: rgba(245,158,11,0.08); }
    select.input-field { color: #f0f0f0; }
    label.field-label { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 5px; display: block; }

    /* ── ナビゲーション ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0d0d0d;
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px; cursor: pointer; min-height: 56px; transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item .nav-icon { font-size: 22px; margin-bottom: 2px; }
    .bottom-nav-item .nav-label { font-size: 10px; font-weight: 600; }
    .bottom-nav-item.active { color: var(--color-primary-light); }
    .bottom-nav-item:not(.active) { color: #444; }

    /* ── ヘッダー ── */
    .main-content {
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
    }
    .header {
      background: #0d0d0d;
      color: var(--text-primary);
      padding: 16px 16px 12px;
      padding-top: calc(16px + env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
    }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; }

    /* ── モーダル ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 200; display: flex; align-items: flex-end;
    }
    .modal-content {
      background: #161616;
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      width: 100%; max-height: 90vh; overflow-y: auto;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }

    /* ── タグ ── */
    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .tag-s { background: rgba(16,185,129,0.18); color: #6ee7b7; }
    .tag-a { background: rgba(99,102,241,0.18); color: #a5b4fc; }
    .tag-b { background: rgba(245,158,11,0.18); color: #fcd34d; }
    .tag-c { background: rgba(239,68,68,0.18); color: #fca5a5; }
    .tag-active { background: rgba(16,185,129,0.18); color: #6ee7b7; }
    .tag-sold { background: rgba(99,102,241,0.18); color: #a5b4fc; }
    .tag-unlisted { background: rgba(255,255,255,0.06); color: #666; }

    /* ── スピナー ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--color-primary-light);
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 写真グリッド ── */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photo-item {
      aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      position: relative; background: #1e1e1e; cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-add {
      border: 2px dashed #333; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px; color: #555;
    }

    /* ── KPIカード ── */
    .kpi-card {
      background: var(--bg-card2);
      border-radius: 14px; padding: 16px;
      border: 1px solid var(--border);
    }
    .kpi-label { font-size: 12px; color: #666; font-weight: 500; margin-bottom: 6px; }
    .kpi-value { font-size: 24px; font-weight: 700; color: #f0f0f0; }
    .kpi-unit { font-size: 14px; color: #666; }

    textarea.input-field { resize: vertical; min-height: 120px; }
    .step-indicator { display: flex; gap: 8px; padding: 0 16px 12px; }
    .step { flex: 1; height: 3px; border-radius: 2px; background: #222; transition: background 0.3s; }
    .step.active { background: var(--color-primary); }
    .step.done { background: var(--color-primary-dark); }

    /* ── トースト ── */
    .toast {
      position: fixed; bottom: calc(70px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      background: #232323; color: white;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 20px; border-radius: 24px;
      font-size: 14px; font-weight: 600; z-index: 9999;
      animation: toastIn 0.2s ease-out, toastOut 0.2s ease-in 2s forwards;
      white-space: nowrap;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/js/app.js?v=20260401b" type="text/babel"></script>
</body>
</html>
