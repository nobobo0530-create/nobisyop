<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景グラデーション：ダーク -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <!-- 赤バッジグラデーション -->
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <!-- 光沢オーバーレイ -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- 細いグリッド線（テクスチャ） -->
  <line x1="256" y1="0" x2="256" y2="512" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- メインのショッピングバッグ（白シルエット） -->
  <g filter="url(#shadow)">
    <!-- バッグ本体 -->
    <rect x="126" y="210" width="260" height="210" rx="22" fill="white"/>
    <!-- ハンドル左 -->
    <path d="M 176 210 L 176 160 Q 176 110 256 110 Q 336 110 336 160 L 336 210"
          fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- バッグの光沢ライン -->
    <rect x="126" y="210" width="260" height="80" rx="22" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- 赤いバッジ（右上） -->
  <circle cx="348" cy="168" r="58" fill="url(#red)" filter="url(#shadow)"/>
  <!-- バッジ内の円（ドーナツ穴イメージ） -->
  <circle cx="348" cy="168" r="22" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="8"/>
  <!-- バッジ内 縦線 -->
  <line x1="348" y1="130" x2="348" y2="148" stroke="rgba(255,255,255,0.9)" stroke-width="8" stroke-linecap="round"/>

  <!-- バッグ内テキスト "のびS" -->
  <text x="256" y="348"
        font-family="Hiragino Sans, Hiragino Kaku Gothic ProN, Yu Gothic, Arial, sans-serif"
        font-size="88" font-weight="700"
        text-anchor="middle" fill="#1a1a2e">のびS</text>

  <!-- 底部ブランドライン -->
  <rect x="80" y="450" width="352" height="2" rx="1" fill="rgba(255,82,82,0.6)"/>

  <!-- 光沢オーバーレイ（全体） -->
  <rect width="512" height="512" rx="80" fill="url(#shine)"/>
</svg>
